<nav class="navbar">
  <div class="empresa-info">
    <img [src]="logoURL" class="logo">
    <div>
      <strong>{{ nombreEmpresa }}</strong>
    </div>
    <div>
      <small>Cédula: {{ cedulaEmpresa }}</small>
    </div>
    <div *ngIf="usuarioActivo">
      <small class="rol">
        Rol: <strong>{{ usuarioActivo.rol }}</strong>
      </small>
    </div>
  </div>

  <a routerLink="/rrhh" routerLinkActive="active">👷‍♂️ RRHH</a>
  <a routerLink="/planilla" routerLinkActive="active">💰 Planilla</a>
  <a routerLink="/finanzas" routerLinkActive="active">📊 Finanzas</a>
  <a routerLink="/vacaciones" routerLinkActive="active">🌴 Vacaciones</a>
  <a routerLink="/incapacidades" routerLinkActive="active">🤒 Incapacidades/Permisos</a>
  <a *ngIf="puedeEditar()" routerLink="/configuracion" routerLinkActive="active">⚙️ Configuración</a>

  <button (click)="logout()">🚪 Cerrar sesión</button>
</nav>
<hr>
