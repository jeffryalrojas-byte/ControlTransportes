<h2>⚙️ Configuración</h2>

<mat-tab-group>

  <!-- 🔹 TAB 1: Cargas Sociales -->
  <mat-tab label="Cargas Sociales">
    <div class="config-form">

      <div class="campo">
        <label>🧾 CCSS Trabajador:</label>
        <input type="number" step="0.01" [(ngModel)]="cargas.ccssTrabajador" /> %
      </div>

      <div class="campo">
        <label>🏢 CCSS Patrono:</label>
        <input type="number" step="0.01" [(ngModel)]="cargas.ccssPatrono" /> %
      </div>

      <br />
      <button (click)="guardarCambios()">💾 Guardar Cambios</button>

      <hr>

      <h3>📜 Historial</h3>
      <table border="1" cellpadding="6" *ngIf="historico.length > 0">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>CCSS Trabajador</th>
            <th>CCSS Patrono</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let h of historico">
            <td>{{ h.fecha }}</td>
            <td>{{ (h.ccssTrabajador * 100) | number:'1.2-2' }} %</td>
            <td>{{ (h.ccssPatrono * 100) | number:'1.2-2' }} %</td>
          </tr>
        </tbody>
      </table>

      <p *ngIf="historico.length === 0">
        No hay configuraciones guardadas aún.
      </p>

    </div>
  </mat-tab>

  <!-- 🔹 TAB 2: Incentivos -->
  <mat-tab label="Incentivos por Puesto">
    <h3>🎁 Incentivos</h3>

    <div class="campo" *ngFor="let p of puestos">
      <label>{{ p }}:</label>
      <input type="number" min="0" [(ngModel)]="incentivos[p]" />
    </div>

    <br>
    <button (click)="guardarIncentivos()">💾 Guardar Incentivos</button>
  </mat-tab>

</mat-tab-group>
